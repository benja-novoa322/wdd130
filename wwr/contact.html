            <div>

        <fieldset>
                    <div>
            <p>Purpose of Message:</p>
            <label>
            <input type="radio" name="purpose" value="inquiry">

            </label><br>
            <label>

            </label><br>
            <label>

            </label>
            </div>
        </fieldset>
        <fieldset>
            <label for="message">Write your query:</label>
            <textarea name="message" id="message" rows="4"></textarea>
            <label for="suscribe">Please subscribe me to the monthly newsletter</label>

        </fieldset>
        <button type="submit">Send your inquiry</button>
